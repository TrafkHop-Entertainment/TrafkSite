name: Deploy Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Add HF SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HF_SSH_KEY }}

      - name: Add HF to known_hosts
        run: |
          mkdir -p ~/.ssh
          # Force IPv4 (-4) and use the full domain
          ssh-keyscan -4 huggingface.co >> ~/.ssh/known_hosts
          # Optional: Add the short domain only if you actually use it in URLs
          ssh-keyscan -4 hf.co >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
