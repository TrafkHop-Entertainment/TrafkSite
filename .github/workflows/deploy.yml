name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Add hf.co to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H hf.co >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Configure HF access
        run: |
          git config --global url."https://${{ secrets.HF_TOKEN }}@huggingface.co/".insteadOf "git@hf.co:"

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
